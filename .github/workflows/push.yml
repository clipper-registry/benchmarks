name: Push benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      buildkit_image:
        description: "BuildKit image to use for Clipper driver (e.g. ghcr.io/clipper-registry/buildkit:sha)"
        required: false
        default: "ghcr.io/clipper-registry/buildkit:latest"
  workflow_call:
    inputs:
      buildkit_image:
        description: "BuildKit image to use for Clipper driver"
        required: false
        type: string
        default: "ghcr.io/clipper-registry/buildkit:latest"
    secrets:
      CLIPPER_CI_CREDENTIALS:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  bench-clipper:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Free Disk Space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: actions/checkout@v6
        with:
          repository: clipper-registry/benchmarks

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=${{ inputs.buildkit_image || 'ghcr.io/clipper-registry/buildkit:latest' }}

      - name: Log in to Clipper
        uses: docker/login-action@v3
        with:
          registry: clipper.dev
          username: token
          password: ${{ secrets.CLIPPER_CI_CREDENTIALS }}

      - uses: ./
        with:
          name: Clipper
          builder: ${{ steps.buildx.outputs.name }}
          base: clipper.dev/clipper/cuda:12.9.0-runtime-ubuntu24.04
          output: "type=clipper,name=clipper.dev/clipper/ci-bench:${{ github.run_id }},push=true"

  bench-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free Disk Space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: actions/checkout@v6
        with:
          repository: clipper-registry/benchmarks

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./
        with:
          name: GHCR
          output: "type=image,name=ghcr.io/${{ github.repository }}/ci-bench:${{ github.run_id }},push=true"

  bench-dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Free Disk Space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: actions/checkout@v6
        with:
          repository: clipper-registry/benchmarks

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: ./
        with:
          name: Docker Hub
          output: "type=image,name=clipperregistry/ci-bench:${{ github.run_id }},push=true"
