name: Push benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      buildkit_image:
        description: "BuildKit image to use for Clipper driver (e.g. ghcr.io/clipper-registry/buildkit:sha)"
        required: false
        default: "ghcr.io/clipper-registry/buildkit:latest"
  workflow_call:
    inputs:
      buildkit_image:
        description: "BuildKit image to use for Clipper driver"
        required: false
        type: string
        default: "ghcr.io/clipper-registry/buildkit:latest"
    secrets:
      CLIPPER_CI_CREDENTIALS:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  bench-clipper:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: clipper-registry/benchmarks

      - uses: ./
        with:
          name: Clipper
          buildkit-image: ${{ inputs.buildkit_image || 'ghcr.io/clipper-registry/buildkit:latest' }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          registry: clipper.dev
          registry-username: token
          registry-password: ${{ secrets.CLIPPER_CI_CREDENTIALS }}
          base: clipper.dev/clipper/cuda:12.9.0-runtime-ubuntu24.04
          output: "type=clipper,name=clipper.dev/clipper/ci-bench:${{ github.run_id }},push=true"

  bench-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          repository: clipper-registry/benchmarks

      - uses: ./
        with:
          name: GHCR
          registry: ghcr.io
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          output: "type=image,name=ghcr.io/${{ github.repository }}/ci-bench:${{ github.run_id }},push=true"

  bench-dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: clipper-registry/benchmarks

      - uses: ./
        with:
          name: Docker Hub
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          output: "type=image,name=clipperregistry/ci-bench:${{ github.run_id }},push=true"
