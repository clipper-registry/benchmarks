name: Push benchmarks

on:
  push:
    branches: [main, cache-export]
  workflow_dispatch:
    inputs:
      buildkit_image:
        description: "BuildKit image to use for Clipper driver (e.g. ghcr.io/clipper-registry/buildkit:sha)"
        required: false
        default: "ghcr.io/clipper-registry/buildkit:latest"
  workflow_call:
    inputs:
      buildkit_image:
        description: "BuildKit image to use for Clipper driver"
        required: false
        type: string
        default: "ghcr.io/clipper-registry/buildkit:latest"
    secrets:
      CLIPPER_CI_CREDENTIALS:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  CLIPPER_BUILDKIT: ${{ inputs.buildkit_image || 'ghcr.io/clipper-registry/buildkit:5dd886012d0c436b382dae13250945a3d68a64df' }}

jobs:
  push:
    name: ${{ matrix.scenario }} / ${{ matrix.registry }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        scenario: [full-cache, no-cache, partial-cache]
        registry: [clipper, ghcr, dockerhub]
        include:
          # --- Per-registry config ---
          - registry: clipper
            registry-host: clipper.dev
            registry-username: token
            registry-password-secret: CLIPPER_CI_CREDENTIALS
            base: clipper.dev/clipper/cuda:12.9.0-runtime-ubuntu24.04
            output-type: clipper
            output-repo: clipper.dev/clipper/ci-bench
            cache-repo: clipper.dev/clipper/ci-bench-cache
          - registry: ghcr
            registry-host: ghcr.io
            registry-password-secret: GITHUB_TOKEN
            output-type: image
            output-repo: ghcr.io/${{ github.repository }}/ci-bench
            cache-repo: ghcr.io/${{ github.repository }}/ci-bench-cache
          - registry: dockerhub
            registry-username-secret: DOCKERHUB_USERNAME
            registry-password-secret: DOCKERHUB_TOKEN
            output-type: image
            output-repo: clipperregistry/ci-bench
            cache-repo: clipperregistry/ci-bench-cache
    steps:
      - uses: actions/checkout@v6
        with:
          repository: clipper-registry/benchmarks

      - uses: ./
        with:
          name: ${{ matrix.scenario }} / ${{ matrix.registry }}
          buildkit-image: ${{ matrix.registry == 'clipper' && env.CLIPPER_BUILDKIT || '' }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ matrix.registry-host || '' }}
          registry-username: >-
            ${{
              matrix.registry-username ||
              matrix.registry-username-secret == 'DOCKERHUB_USERNAME' && secrets.DOCKERHUB_USERNAME ||
              matrix.registry-password-secret == 'GITHUB_TOKEN' && github.actor ||
              ''
            }}
          registry-password: >-
            ${{
              matrix.registry-password-secret == 'CLIPPER_CI_CREDENTIALS' && secrets.CLIPPER_CI_CREDENTIALS ||
              matrix.registry-password-secret == 'DOCKERHUB_TOKEN' && secrets.DOCKERHUB_TOKEN ||
              matrix.registry-password-secret == 'GITHUB_TOKEN' && secrets.GITHUB_TOKEN ||
              ''
            }}
          base: ${{ matrix.base || 'nvidia/cuda:12.9.0-runtime-ubuntu24.04' }}
          output: "type=${{ matrix.output-type }},name=${{ matrix.output-repo }}:${{ github.run_id }},push=true"
          cache-from: ${{ matrix.scenario != 'no-cache' && format('type=registry,ref={0}:latest', matrix.cache-repo) || '' }}
          cache-to: >-
            ${{
              matrix.scenario == 'partial-cache'
                && format('type=registry,ref={0}-extra:latest,mode=max', matrix.cache-repo)
                || format('type=registry,ref={0}:latest,mode=max', matrix.cache-repo)
            }}
          extra-packages: ${{ matrix.scenario == 'partial-cache' && 'curl wget' || '' }}
