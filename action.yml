name: Build and push benchmark
description: Build the benchmark image, push to a registry, and report per-phase timings.

inputs:
  name:
    description: "Registry name for the summary heading (e.g. Clipper, GHCR)"
    required: true
  output:
    description: "docker buildx build --output value"
    required: true
  base:
    description: "Base image (passed as BASE build arg)"
    required: false
    default: "nvidia/cuda:12.9.0-runtime-ubuntu24.04"
  context:
    description: "Build context directory (relative to repo root)"
    required: false
    default: "push"
  buildkit-image:
    description: "BuildKit image for the buildx driver"
    required: false
    default: ""
  cache-from:
    description: "docker buildx build --cache-from value"
    required: false
    default: ""
  cache-to:
    description: "docker buildx build --cache-to value"
    required: false
    default: ""
  extra-packages:
    description: "Additional apt packages to install (space-separated)"
    required: false
    default: ""
  registry:
    description: "Registry to log in to (e.g. clipper.dev, ghcr.io)"
    required: false
    default: ""
  registry-username:
    description: "Registry username"
    required: false
    default: ""
  registry-password:
    description: "Registry password or token"
    required: false
    default: ""
  ghcr-token:
    description: "GHCR token for pulling buildkit image (GITHUB_TOKEN)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Free Disk Space
      shell: bash
      run: |
        CORES=$(nproc)
        if [ "$CORES" -lt 4 ]; then
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        fi

    - name: Login to GHCR
      if: inputs.ghcr-token != ''
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr-token }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: ${{ inputs.buildkit-image && format('image={0}', inputs.buildkit-image) || '' }}
        buildkitd-flags: --debug

    - name: Log in to registry
      if: inputs.registry-password != ''
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry || '' }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Sanitize name
      id: meta
      shell: bash
      env:
        RAW_NAME: ${{ inputs.name }}
      run: |
        SAFE="${RAW_NAME// /-}"
        SAFE="${SAFE////-}"
        echo "safe-name=$SAFE" >> "$GITHUB_OUTPUT"

    - name: Build and push
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        SAFE_NAME: ${{ steps.meta.outputs.safe-name }}
      run: |
        echo "Action path: $ACTION_PATH"
        ls "$ACTION_PATH/scripts/" || true
        docker buildx build \
          --progress=rawjson \
          --builder=${{ steps.buildx.outputs.name }} \
          --build-arg BASE=${{ inputs.base }} \
          --build-arg EXTRA_PACKAGES="${{ inputs.extra-packages }}" \
          --build-arg SOURCE_DATE_EPOCH=0 \
          --output "${{ inputs.output }}" \
          ${{ inputs.cache-from && format('--cache-from "{0}"', inputs.cache-from) || '' }} \
          ${{ inputs.cache-to && format('--cache-to "{0}"', inputs.cache-to) || '' }} \
          "$ACTION_PATH/${{ inputs.context }}" 2>&1 \
          | tee "/tmp/buildx-${SAFE_NAME}.jsonl" \
          | python3 "$ACTION_PATH/scripts/parse-timing.py" \
              --summary-file "$GITHUB_STEP_SUMMARY" \
              --name "${{ inputs.name }}"

    - name: Dump buildkitd logs
      if: always()
      shell: bash
      run: |
        CONTAINER=$(docker ps -q --filter "name=buildx_buildkit_${{ steps.buildx.outputs.name }}")
        if [ -n "$CONTAINER" ]; then
          docker logs "$CONTAINER" 2>&1 | tee /tmp/buildkitd-${{ steps.meta.outputs.safe-name }}.log | grep -i "makeChunkFetcher\|chunk\|fetch\|404\|error" || true
        fi

    - name: Upload raw build log
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: buildx-rawjson-${{ steps.meta.outputs.safe-name }}
        path: /tmp/buildx-*.jsonl
        retention-days: 7
