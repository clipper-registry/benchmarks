name: Clipper Push Benchmarks
description: Build and push a CUDA+PyTorch image to Clipper, GHCR, and Docker Hub, measuring push time for each.

branding:
  icon: zap
  color: blue

inputs:
  buildkit-image:
    description: Clipper BuildKit image reference.
    required: false
    default: "ghcr.io/clipper-registry/buildkit:latest"

runs:
  using: composite
  steps:
    - name: Free Disk Space
      shell: bash
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

    - name: Set up Clipper BuildKit
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: image=${{ inputs.buildkit-image }}

    - name: Log in to Clipper
      uses: docker/login-action@v3
      with:
        registry: clipper.dev
        username: token
        password: ${{ env.CLIPPER_CI_CREDENTIALS }}

    - name: Build and push to Clipper
      shell: bash
      run: |
        START=$(date +%s%N)
        docker buildx build \
          --build-arg BASE=clipper.dev/clipper/cuda:12.9.0-runtime-ubuntu24.04 \
          --build-arg SOURCE_DATE_EPOCH=0 \
          --output "type=clipper,name=clipper.dev/clipper/ci-bench:${{ github.run_id }},push=true" \
          ${{ github.action_path }}/push
        END=$(date +%s%N)
        MS=$(( (END - START) / 1000000 ))
        echo "### Clipper push: ${MS}ms" >> $GITHUB_STEP_SUMMARY

    - name: Remove Clipper builder
      shell: bash
      run: docker buildx rm || true

    - name: Set up standard BuildKit
      uses: docker/setup-buildx-action@v4

    - name: Build and push to GHCR
      shell: bash
      run: |
        START=$(date +%s%N)
        docker buildx build \
          --build-arg SOURCE_DATE_EPOCH=0 \
          --output "type=image,name=ghcr.io/${{ github.repository }}/ci-bench:${{ github.run_id }},push=true" \
          ${{ github.action_path }}/push
        END=$(date +%s%N)
        MS=$(( (END - START) / 1000000 ))
        echo "### GHCR push: ${MS}ms" >> $GITHUB_STEP_SUMMARY

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    - name: Build and push to Docker Hub
      shell: bash
      run: |
        START=$(date +%s%N)
        docker buildx build \
          --build-arg SOURCE_DATE_EPOCH=0 \
          --output "type=image,name=clipperregistry/ci-bench:${{ github.run_id }},push=true" \
          ${{ github.action_path }}/push
        END=$(date +%s%N)
        MS=$(( (END - START) / 1000000 ))
        echo "### Docker Hub push: ${MS}ms" >> $GITHUB_STEP_SUMMARY
