name: Build and push benchmark
description: Build the benchmark image, push to a registry, and report per-phase timings.

inputs:
  name:
    description: "Registry name for the summary heading (e.g. Clipper, GHCR)"
    required: true
  output:
    description: "docker buildx build --output value"
    required: true
  base:
    description: "Base image (passed as BASE build arg)"
    required: false
    default: "nvidia/cuda:12.9.0-runtime-ubuntu24.04"
  context:
    description: "Build context directory (relative to repo root)"
    required: false
    default: "push"
  buildkit-image:
    description: "BuildKit image for the buildx driver"
    required: false
    default: ""
  cache-from:
    description: "docker buildx build --cache-from value"
    required: false
    default: ""
  cache-to:
    description: "docker buildx build --cache-to value"
    required: false
    default: ""
  registry:
    description: "Registry to log in to (e.g. clipper.dev, ghcr.io)"
    required: false
    default: ""
  registry-username:
    description: "Registry username"
    required: false
    default: ""
  registry-password:
    description: "Registry password or token"
    required: false
    default: ""
  ghcr-token:
    description: "GHCR token for pulling buildkit image (GITHUB_TOKEN)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Free Disk Space
      shell: bash
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

    - name: Login to GHCR
      if: inputs.ghcr-token != ''
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr-token }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: ${{ inputs.buildkit-image && format('image={0}', inputs.buildkit-image) || '' }}

    - name: Log in to registry
      if: inputs.registry-password != ''
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry || '' }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Build and push
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        SAFE_NAME: ${{ inputs.name }}
      run: |
        SAFE_NAME="${SAFE_NAME// /-}"
        SAFE_NAME="${SAFE_NAME////-}"
        echo "Action path: $ACTION_PATH"
        ls "$ACTION_PATH/scripts/" || true
        docker buildx build \
          --progress=rawjson \
          --builder=${{ steps.buildx.outputs.name }} \
          --build-arg BASE=${{ inputs.base }} \
          --build-arg SOURCE_DATE_EPOCH=0 \
          --output "${{ inputs.output }}" \
          ${{ inputs.cache-from && format('--cache-from "{0}"', inputs.cache-from) || '' }} \
          ${{ inputs.cache-to && format('--cache-to "{0}"', inputs.cache-to) || '' }} \
          "$ACTION_PATH/${{ inputs.context }}" 2>&1 \
          | python3 "$ACTION_PATH/scripts/parse-timing.py" \
              --summary-file "$GITHUB_STEP_SUMMARY" \
              --name "${{ inputs.name }}"
