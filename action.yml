name: Build and push benchmark
description: Build the benchmark image, push to a registry, and report per-phase timings.

inputs:
  name:
    description: "Registry name for the summary heading (e.g. Clipper, GHCR)"
    required: true
  output:
    description: "docker buildx build --output value"
    required: true
  base:
    description: "Base image (passed as BASE build arg)"
    required: false
    default: "nvidia/cuda:12.9.0-runtime-ubuntu24.04"
  context:
    description: "Build context directory (relative to repo root)"
    required: false
    default: "push"
  buildkit-image:
    description: "BuildKit image for the buildx driver"
    required: false
    default: ""
  registry:
    description: "Registry to log in to (e.g. clipper.dev, ghcr.io)"
    required: false
    default: ""
  registry-username:
    description: "Registry username"
    required: false
    default: ""
  registry-password:
    description: "Registry password or token"
    required: false
    default: ""
  ghcr-token:
    description: "GHCR token for pulling buildkit image (GITHUB_TOKEN)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Free Disk Space
      shell: bash
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

    - name: Login to GHCR
      if: inputs.ghcr-token != ''
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr-token }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: ${{ inputs.buildkit-image && format('image={0}', inputs.buildkit-image) || '' }}

    - name: Log in to registry
      if: inputs.registry-password != ''
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry || '' }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Build and push
      shell: bash
      run: |
        docker buildx build \
          --progress=rawjson \
          --builder=${{ steps.buildx.outputs.name }} \
          --build-arg BASE=${{ inputs.base }} \
          --build-arg SOURCE_DATE_EPOCH=0 \
          --output "${{ inputs.output }}" \
          ${{ github.action_path }}/${{ inputs.context }} 2>&1 \
          | tee /tmp/build-${{ inputs.name }}.jsonl \
          | python3 ${{ github.action_path }}/scripts/parse-timing.py
        {
          echo "### ${{ inputs.name }}"
          echo "| Phase | Duration |"
          echo "|-------|----------|"
          python3 ${{ github.action_path }}/scripts/parse-timing.py --summary /tmp/build-${{ inputs.name }}.jsonl
        } >> $GITHUB_STEP_SUMMARY
